<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกค่าเที่ยวรถ</title>
    <!-- นำเข้า LINE SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h2, h3 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #218838;
        }
        /* สไตล์ของตารางประวัติ */
        .history-container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .btn-send {
            background-color: #28a745;
            color: white;
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 4px;
            width: auto;
            margin-top: 0;
        }
        .btn-delete {
            background-color: #dc3545;
            color: white;
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 4px;
            width: auto;
            margin-top: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚚 บันทึกค่าเที่ยวรถ</h2>
    
    <div class="form-group">
        <label for="truckId">ทะเบียนรถ / เบอร์รถ:</label>
        <input type="text" id="truckId" placeholder="เช่น 10-1234 หรือ บ-01">
    </div>

    <div class="form-group">
        <label for="route">เส้นทาง (จากไหนไปไหน):</label>
        <input type="text" id="route" placeholder="เช่น ปทุม-ลาดหลุมแก้ว">
    </div>

    <div class="form-group">
        <label for="price">ค่าเที่ยว (บาท):</label>
        <input type="number" id="price" placeholder="ใส่จำนวนเงิน">
    </div>

    <button onclick="saveToWeb()">💾 บันทึกในเว็บ</button>
</div>

<!-- ส่วนของตารางแสดงข้อมูล -->
<div class="history-container">
    <h3>📊 ตารางประวัติค่าเที่ยวรถ</h3>
    <table>
        <thead>
            <tr>
                <th>รถ</th>
                <th>เส้นทาง</th>
                <th>ค่าเที่ยว</th>
                <th>จัดการ</th>
            </tr>
        </thead>
        <tbody id="historyTableBody">
            <!-- ข้อมูลจากเว็บจะมาโผล่ตรงนี้ -->
        </tbody>
    </table>
</div>

<script>
    // 1. เริ่มทำงานระบบ LIFF
    async function main() {
        await liff.init({ liffId: "2010757302-yGs8r3U0" });
        if (!liff.isLoggedIn()) {
            liff.login();
        }
        displayHistory(); // เปิดมาให้โหลดตารางมาโชว์ทันที
    }
    main();

    // 2. ฟังก์ชันบันทึกข้อมูลลงบราวเซอร์เว็บ
    function saveToWeb() {
        const truckId = document.getElementById('truckId').value;
        const route = document.getElementById('route').value;
        const price = document.getElementById('price').value;

        if (!truckId || !route || !price) {
            alert('กรอกข้อมูลให้ครบก่อนนะมึง!');
            return;
        }

        // ดึงข้อมูลเก่าในเว็บออกมาก่อน (ถ้าไม่มีให้เป็นอาร์เรย์ว่าง)
        let history = JSON.parse(localStorage.getItem('tripHistory')) || [];

        // เพิ่มข้อมูลใหม่เข้าไป
        const newTrip = {
            id: Date.now(), // ใช้เวลาเป็น ID สุ่มไม่ให้ซ้ำกัน
            truckId: truckId,
            route: route,
            price: price
        };
        history.push(newTrip);

        // เซฟกลับลงเว็บ
        localStorage.setItem('tripHistory', JSON.stringify(history));

        // เคลียร์ช่องกรอกข้อมูลให้ว่าง
        document.getElementById('truckId').value = '';
        document.getElementById('route').value = '';
        document.getElementById('price').value = '';

        alert('บันทึกข้อมูลลงตารางเรียบร้อยมึง!');
        displayHistory(); // อัปเดตตารางให้เห็นทันที
    }

    // 3. ฟังก์ชันดึงข้อมูลมาวาดลงตาราง
    function displayHistory() {
        const history = JSON.parse(localStorage.getItem('tripHistory')) || [];
        const tableBody = document.getElementById('historyTableBody');
        tableBody.innerHTML = ''; // เคลียร์ตารางเก่า

        if (history.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#999;">ยังไม่มีข้อมูลบันทึกไว้มึง</td></tr>`;
            return;
        }

        // วนลูปเอาข้อมูลมาใส่ในตาราง
        history.forEach((trip) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${trip.truckId}</td>
                <td>${trip.route}</td>
                <td>${trip.price} บาท</td>
                <td>
                    <button class="btn-send" onclick="sendToLine('${trip.truckId}', '${trip.route}', '${trip.price}')">🟢 ส่ง LINE</button>
                    <button class="btn-delete" onclick="deleteTrip(${trip.id})">❌ ลบ</button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    }

    // 4. ฟังก์ชันส่งข้อมูลเข้า LINE เฉพาะแถวที่เลือก
    function sendToLine(truckId, route, price) {
        const messageText = `📋 บันทึกค่าเที่ยวรถใหม่\n🚛 รถ: ${truckId}\n📍 เส้นทาง: ${route}\n💰 ค่าเที่ยว: ${price} บาท`;

        liff.sendMessages([{
            type: 'text',
            text: messageText
        }]).then(() => {
            alert('ส่งเข้า LINE สำเร็จแล้วมึง!');
        }).catch((err) => {
            console.error('เกิดข้อผิดพลาด:', err);
            alert('ส่งข้อมูลไม่สำเร็จมึง ลองดูอีกที');
        });
    }

    // 5. ฟังก์ชันลบข้อมูลออกจากตารางเว็บ
    function deleteTrip(id) {
        if (confirm('มึงแน่ใจนะว่าจะลบรายการนี้?')) {
            let history = JSON.parse(localStorage.getItem('tripHistory')) || [];
            // กรองเอาไอดีที่ไม่ต้องการลบเก็บไว้
            history = history.filter(trip => trip.id !== id);
            localStorage.setItem('tripHistory', JSON.stringify(history));
            displayHistory(); // อัปเดตตารางใหม่
        }
    }
</script>

</body>
</html>
