<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกค่าเที่ยวรถ</title>
    <!-- นำเข้า LINE SDK และ ไลบรารีแปลงหน้าจอเป็นรูปภาพ (html2canvas) -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2, h3 { text-align: center; color: #2c3e50; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #4b5563; }
        input[type="text"], input[type="date"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 16px; }
        
        .btn-main { width: 100%; color: white; border: none; padding: 14px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-success { background-color: #10b981; }
        .btn-success:hover { background-color: #059669; }
        .btn-excel { background-color: #0284c7; margin-bottom: 15px; }
        .btn-excel:hover { background-color: #0369a1; }
        
        /* ตารางประวัติ */
        .table-container { margin-top: 15px; overflow-x: auto; background: white; padding: 10px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; min-width: 800px; }
        th, td { padding: 10px 12px; border: 1px solid #e5e7eb; text-align: center; }
        th { background-color: #1e3a8a; color: white; font-weight: 600; }
        tr:nth-child(even) { background-color: #f9fafb; }
        
        .btn-action { padding: 6px 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; color: white; margin: 2px; }
        .btn-send { background-color: #06b6d4; }
        .btn-delete { background-color: #ef4444; }
        input[type="checkbox"] { transform: scale(1.3); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚚 ระบบบันทึกค่าเที่ยวรถ</h2>
    
    <!-- ฟอร์มกรอกข้อมูล -->
    <div class="form-group">
        <label>📅 วันที่ / เดือน / ปี:</label>
        <input type="date" id="dateInput">
    </div>
    
    <div class="form-group">
        <label>🔢 ทะเบียนรถ / เบอร์รถ:</label>
        <input type="text" id="truckId" placeholder="เช่น 67-1430">
    </div>

    <div class="form-group">
        <label>📍 ตำแหน่งเริ่มต้น (ต้นทาง):</label>
        <input type="text" id="startRoute" placeholder="เช่น ปทุมธานี">
    </div>

    <div class="form-group">
        <label>🏁 จุดหมายสุดท้าย (ปลายทาง):</label>
        <input type="text" id="endRoute" placeholder="เช่น ลาดหลุมแก้ว">
    </div>

    <div class="form-group">
        <label>💰 ค่าเที่ยว (บาท):</label>
        <input type="number" id="basePrice" placeholder="ใส่จำนวนเงิน เช่น 150">
    </div>

    <button class="btn-main btn-success" onclick="saveToWeb()">💾 บันทึกในเว็บ</button>

    <hr style="margin: 30px 0; border: 0; border-top: 1px dashed #ccc;">

    <!-- ส่วนตารางประวัติ -->
    <h3>📊 ตารางประวัติค่าเที่ยวรถ</h3>
    
    <button class="btn-main btn-excel" onclick="generateTableImage()">📸 คลิกเพื่อสร้างรูปภาพตารางประวัติสรุปงาน</button>

    <div class="table-container" id="captureTarget">
        <table>
            <thead>
                <tr>
                    <th>วัน/เดือน/ปี</th>
                    <th>ทะเบียน</th>
                    <th>ตำแหน่งเริ่มต้น</th>
                    <th>จุดหมายสุดท้าย</th>
                    <th>งานใกล้</th>
                    <th>งานกลาง</th>
                    <th>งานไกล</th>
                    <th>MT ใกล้</th>
                    <th>MT กลาง</th>
                    <th>MT ไกล</th>
                    <th>ค่าเที่ยว</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="historyTableBody">
                <!-- ข้อมูล JavaScript -->
            </tbody>
        </table>
    </div>
</div>

<script>
    document.getElementById('dateInput').valueAsDate = new Date();

    async function main() {
        try {
            await liff.init({ liffId: "2010757302-yGs8r3U0" });
            if (!liff.isLoggedIn()) { liff.login(); }
            displayHistory();
        } catch (error) { console.error("LIFF ล้มเหลว:", error); }
    }
    main();

    function saveToWeb() {
        const dateInput = document.getElementById('dateInput').value;
        const truckId = document.getElementById('truckId').value;
        const startRoute = document.getElementById('startRoute').value;
        const endRoute = document.getElementById('endRoute').value;
        const basePrice = parseFloat(document.getElementById('basePrice').value) || 0;

        if (!dateInput || !truckId || !startRoute || !endRoute || !basePrice) {
            alert('กรอกข้อมูลให้ครบก่อนนะมึง!');
            return;
        }

        const dateObj = new Date(dateInput);
        const formattedDate = `${dateObj.getDate()}/${dateObj.getMonth() + 1}/${dateObj.getFullYear()}`;
        let history = JSON.parse(localStorage.getItem('tripHistory')) || [];
        
        const newTrip = {
            id: Date.now(),
            date: formattedDate,
            truckId: truckId,
            startRoute: startRoute,
            endRoute: endRoute,
            basePrice: basePrice,
            workNear: false, workMid: false, workFar: false,
            mtNear: false, mtMid: false, mtFar: false
        };

        history.push(newTrip);
        localStorage.setItem('tripHistory', JSON.stringify(history));
        
        document.getElementById('startRoute').value = '';
        document.getElementById('endRoute').value = '';
        document.getElementById('basePrice').value = '';

        alert('เพิ่มข้อมูลลงตารางสำเร็จมึง!');
        displayHistory();
    }

    function calculateTotal(item) {
        return item.basePrice; 
    }

    function updateCheckbox(id, field, checkbox) {
        let history = JSON.parse(localStorage.getItem('tripHistory')) || [];
        const index = history.findIndex(item => item.id === id);
        if (index !== -1) {
            history[index][field] = checkbox.checked;
            localStorage.setItem('tripHistory', JSON.stringify(history));
        }
    }

    function displayHistory() {
        const tbody = document.getElementById('historyTableBody');
        tbody.innerHTML = '';
        let history = JSON.parse(localStorage.getItem('tripHistory')) || [];

        if (history.length === 0) {
            tbody.innerHTML = `<tr><td colspan="12" style="color:#999;">ยังไม่มีข้อมูลบันทึกไว้มึง</td></tr>`;
            return;
        }

        history.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.date}</td>
                <td>${item.truckId}</td>
                <td>${item.startRoute}</td>
                <td>${item.endRoute}</td>
                <td><input type="checkbox" ${item.workNear ? 'checked' : ''} onchange="updateCheckbox(${item.id}, 'workNear', this)"></td>
                <td><input type="checkbox" ${item.workMid ? 'checked' : ''} onchange="updateCheckbox(${item.id}, 'workMid', this)"></td>
                <td><input type="checkbox" ${item.workFar ? 'checked' : ''} onchange="updateCheckbox(${item.id}, 'workFar', this)"></td>
                <td><input type="checkbox" ${item.mtNear ? 'checked' : ''} onchange="updateCheckbox(${item.id}, 'mtNear', this)"></td>
                <td><input type="checkbox" ${item.mtMid ? 'checked' : ''} onchange="updateCheckbox(${item.id}, 'mtMid', this)"></td>
                <td><input type="checkbox" ${item.mtFar ? 'checked' : ''} onchange="updateCheckbox(${item.id}, 'mtFar', this)"></td>
                <td style="font-weight:bold; color:#1e3a8a;">${calculateTotal(item)} บาท</td>
                <td>
                    <button class="btn-action btn-send" onclick="sendToLine(${item.id})">ส่ง LINE</button>
                    <button class="btn-action btn-delete" onclick="deleteTrip(${item.id})">ลบ</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function generateTableImage() {
        let history = JSON.parse(localStorage.getItem('tripHistory')) || [];
        if (history.length === 0) {
            alert('ไม่มีข้อมูลในตารางจะให้แคปเลยมึง กรอกข้อมูลก่อน!');
            return;
        }

        const target = document.getElementById('captureTarget');

        html2canvas(target, {
            backgroundColor: "#ffffff",
            logging: false,
            useCORS: true
        }).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const newWindow = window.open();
            if (newWindow) {
                newWindow.document.write(`
                    <html>
                    <head>
                        <title>รายงานตารางค่าเที่ยวรถ</title>
                        <meta name="viewport" content="width=device-width, initial-scale=1.0">
                        <style>
                            body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f4f6f9; font-family: sans-serif; padding: 20px; }
                            img { max-width: 100%; height: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border: 1px solid #ccc; }
                            .notice { margin-bottom: 15px; background: #1e3a8a; color: white; padding: 10px 15px; border-radius: 6px; font-size: 14px; text-align: center; font-weight: bold; }
                        </style>
                    </head>
                    <body>
                        <div class="notice">✨ เปิดหน้ารายงานสำเร็จ! มึงกดปุ่มแชร์หรือเซฟรูปที่มุมจอส่งเข้า LINE ได้เลยมึง</div>
                        <img src="${imgData}" />
                    </body>
                    </html>
                `);
                newWindow.document.close();
            } else {
                alert('บราวเซอร์บล็อก Pop-up มึงกดอนุญาตให้เปิดหน้าต่างใหม่ก่อนนะมึง!');
            }
        }).catch(err => {
            alert('เกิดข้อผิดพลาดในการสร้างรูปภาพมึงลองดูใหม่ดิ๊');
            console.error(err);
        });
    }

    function sendToLine(id) {
        let history = JSON.parse(localStorage.getItem('tripHistory')) || [];
        const item = history.find(t => t.id === id);
        if (!item) return;

        const checkNear = item.workNear ? "✅ ใกล้" : "❌ ใกล้";
        const checkMid  = item.workMid  ? "✅ กลาง" : "❌ กลาง";
        const checkFar  = item.workFar  ? "✅ ไกล" : "❌ ไกล";
        const checkMtNear = item.mtNear ? "✅ MT ใกล้" : "❌ MT ใกล้";
        const checkMtMid  = item.mtMid  ? "✅ MT กลาง" : "❌ MT กลาง";
        const checkMtFar  = item.mtFar  ? "✅ MT ไกล" : "❌ MT ไกล";

        const messageText = `📋 บันทึกค่าเที่ยวรถใหม่\n` +
                            `📅 วันที่: ${item.date}\n` +
                            `CN: ${item.truckId}\n` +
                            `📍 เส้นทาง: ${item.startRoute} - ${item.endRoute}\n` +
                            `------------------------\n` +
                            `📊 รายการงานที่วิ่ง:\n` +
                            `${checkNear} | ${checkMid} | ${checkFar}\n` +
                            `${checkMtNear} | ${checkMtMid} | ${checkMtFar}\n` +
                            `------------------------\n` +
                            `💰 ค่าเที่ยว: ${calculateTotal(item)} บาท`;

        liff.sendMessages([{ type: 'text', text: messageText }]).then(() => {
            alert('ส่งข้อมูลเข้าแชทเรียบร้อยแล้วมึง! 🚀');
        }).catch((err) => { console.error('ส่งไลน์ล้มเหลว', err); });
    }

    function deleteTrip(id) {
        if(confirm('จะลบรายการนี้จริงหรอถามจริง?')) {
            let history = JSON.parse(localStorage.getItem('tripHistory')) || [];
            history = history.filter(item => item.id !== id);
            localStorage.setItem('tripHistory', JSON.stringify(history));
            displayHistory();
        }
    }
</script>
</body>
</html>
